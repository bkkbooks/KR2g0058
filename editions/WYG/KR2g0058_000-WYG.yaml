body:
  text: 保越録傳記𩔖四雜録之屬提要臣等謹案保越録一卷不著撰人名氏載元順帝至正十九年明師攻紹興事是時明將為胡大海禦之者張士誠將吕珍也凡攻三月卒不能下乃還是録稱士誠兵曰我軍稱珍曰公殆士誠未亡時紹興人所紀其中稱明為大軍及太祖髙皇帝字則疑士誠亡後明人傳鈔所改耳紹興自是以後獨保守八年及至正二十六年始歸于明珍亦至是年湖州之敗乃降于徐達雖初事非主晚節不終而在紹興則不為無功矣大海攻紹興挫衂及其縱兵淫掠發宋陵墓諸惡蹟明史皆不載所録張正䝉妻韓氏女池奴馮道二妻抗節事明史亦皆不書尤足補史傳之遺故録之以備參考焉乾隆四十五年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書保越録至正十八年冬十一月戊戍浙江等處行樞密院副使吕公珍來鎮紹興時穆爾古蘇遇變之後越民思之如失怙恃公至祭而哭之拜其母於家中嚴肅號令安和人民百物安堵上下賴焉大軍自取蘭溪勢益猖獗十二月甲申克婺州十九年春正庚申越城嚴備公命所屬將士講畫方略以為備禦乃相度羅城外雖有排柵無險可恃遂命增濠各廣五丈深二丈繇是排柵沮水益固而戰船往來俱得便利瓮城逾河增築月城上起望樓周列廬舍聚石疊木以為備立砲架開箭牕樹屏牆施弔橋傍置兩門以便士卒出入城外復起土壘石櫈左右拱翼以為外䕶度大兵必至乃督城外居民悉遷城中毁居宇近城者清野以待之二月大軍哨掠林落執民為鄉道不從者輙殺之丁卯自諸暨分三路一出楓橋古博嶺天章木栅至亭山一出江竈暨于茅洋漓渚至戴旂山一出街亭象路鑄石嶺平水至九里己巳大軍皆集首將胡大海僉院陽景指揮米保同僉寗同僉何同僉謝院判等分管劄寨置立窩舖連延不絶先是長鎗軍暴於諸暨公逐之出境及苗軍與我軍有故怨歸大軍致毒于我苗軍楊指揮等壘于西直常禧門長鎗軍從寗同僉壘于東直稽山門皆為先鋒軍公命我巴爾斯布哈米文選守迎恩門百户宋之傑唐元臣蔣廷節沙班馮遇春湯成顧直全房璽佐之命元帥顧得興守常禧門萬户劉得興朱榮馬愈陳亮吕振顧興劉得旺林定江朝宗佐之命元帥元信胡大有周元守植利門萬户鄧世全陳裕華琢田英佐之命將軍田希仁萬户丁興祖守稽山門萬户王翼裔福陳祥謝運楊佐之命元帥包王守五瑞門萬户徐振苗入忠卞得全葛升佐之命元帥劉宣守都泗門兼守昌安門萬户費復初僧會真秦泰鎮撫張貴和佐之各總部下軍校分守汛地城南鮑郎山則植利門將帥兼守之城北戒珠山則元帥圖們岱爾鎮撫陳清守之城東吹沙灣則元帥葉文舉萬户潘宗金勝守之城西厖公池則萬户康巴延特穆爾守之總管焦德昭萬户呉元亮揚春戴德蔡旺各以本部居中軍調遣命總管楊昶千户馬俊張徳勝趙義周元唐完各以先鋒居帳前随行接戰令總管岳宗錢保尤全陸元馬飛萬户楊仕全江遇龍何清高戒張旺千户袁禎胡廣章茂光哲各以騎兵出入衛從團結四隅義民守䕶策應以部長統禦長禦長統社長社長統保長保長統甲首設部司以統轄之東南隅王克名余思齊副尉唐元夀尉丞唐夀謙東北隅部尉殷謙善越衡尉丞唐榮總制于上而調度之御史掾吏陳修行樞密院都事俞堯臣上下協心以為守備位置既定乃開門延敵公與將校議曰敵勢逺來利在速戰而城外多水非用武之地汝等慎勿躁進以寡禦衆以逸待勞觀其動靜與之持久此吾志也遣掾吏呉瑾之浙省議兵食禦備事庚午大軍攻常禧門我軍以騎兵戰船並進居民登城守䕶大軍馳突詬詈肆侮總管焦徳昭倪昶等分部接戰公躍馬向大軍陣有一騎迎公公叱之曰汝是誰我舍命大王也語未畢公揮攩杈已中其頥遂擒以還大軍披靡元帥顧徳興萬户丁興祖馳突之大軍引退行臺官屬皆集卧龍山上公還入城御史大夫慶童舉酒迎勞以所乗馬贈公辛未大軍攻稽山門我軍禦之以石砲火筒擊之其先鋒先應手而斃二人大軍阻春波橋下我軍據三橋相望詬罵一進一退至晚各解散我頭目龐成擒獲押子一人御史大夫賞官縀一疋公命為百户是夜以舟師燒何山大寨分省平章張仕信遣元帥張世闕漕杭州糧一萬石由官河至紹興後因艱澁世闕乃自浙江出海經逹三江我軍陷在諸暨者相繼來歸公連日出城攻大軍耆老請曰一城之命懸于公願無輕出公曰大軍初至其勢方銳吾不身先士卒以挫其鋒誰肯出力自是連日出戰皆㨗獻馘執俘士氣增倍人人思奮大軍見公鎧甲輙引去丙子大軍乗鮑郎山運積薪草將填河燒排柵我軍自城上射之以火箭燒其薪草大軍計不得施御史大夫以酒勞諸軍命拘收官馬以助軍用苦城外沮洳往來艱阻乃留徑山下填河接路取禹王廟徑逹亭山總管焦徳昭萬户呉元亮以兵帥扎寨半港廟斷其往來所塞河道遂復開過命行樞宻院掾吏華凱尹性以鹽換米二萬石以贍軍公連日獲至俘囚命鞫之其果大軍殺人者方始加戮其餘脇從並釋不問仍給衣食大軍勝諸暨之兵不數日皆抵城下而軍勢益張城中人人自危公連日擊退之以示無復憂畏每交戰城上觀者雜于卒伍中耳目既熟皆恬然不復憂懼市井作息無異平日戊寅公與葉文舉俞堯臣陳闕劉明劉宣周巖譚震訢于神前約為兄弟甲申大軍將黄保元帥收掠錢清掘抱姑堰六十餘文總管丘宗從公擊大軍常禧門外中流矢于口貫項而出遣指揮張憲至浙江省與諸軍告糧時驛道梗塞由三江海船渡一夕而至先是海道使客未有行者自是始通辛卯時大軍之勢張人心洶洶鎮撫金三官努以私受大軍暗號被罪上下益相疑懼大軍揚言城中民約我舉火為内應是夜三更城東北上民有火炬使卒通報言民通大軍約三日為變公曰吾不負民民豈負我耶總管焦徳昭請以二皷擊四皷休擊三皷及使人察市巷居皆安寢如常至夜不復語由是大軍間不能入浙江省元帥賈彪統民守錢清大軍掘呉後小赭壩大軍糧盡大索民船四出抄掠財物米榖婦女孳畜所載不盡悉皆焚之或棄水中深山窮谷無處不到數十里之内蕩然一空山隂張正䝉字景思貴池縣尹士元之子妻韓氏乃鄉先生韓性之女也正蒙仕湖州徳清縣務提領塟母南池廬側大軍至正䝉取先世神主埋之盡竄入山谷間暮歸見神主棄擲廬屋盡毁恐被汚辱與妻共縊死女池奴夜歸家女不敢哭解尸于地自投崖下而死次女越奴晝匿山中夜歸守尸旁尋亦餓死大軍經歴趙姓者池州人舊知正蒙名訪得其死狀率衆瘞之正䝉母亦被其發趙復掩之既而嘆曰今日我塟他人明日未知何人塟我也嘆息而去命元帥府經歴譚震都事周巖督義兵築三江陡亹及各海塘浙江丞相達實特穆爾遣參政徹色樞宻同僉沙闕爾院判都哷相繼統兵來赴援公于蕭山縣駐扎守禦山隂南池郁景文妻徐氏蔡彦謙妻楊氏同避難俱被大軍執驅迫以前二婦度不能脱乃共往大軍營願首飾衣服而後從大軍信既還皆投井而死大軍發掘冢墓自理宗慈獻夫人以下至官庶墳墓無不發金玉寶器捆載而去其尸或斂之以水銀面皆如生被戮斬汚辱者尤甚三月癸巳大軍分兵增寨在西者移中堰王家山絹山賴山在東者移胡家奥凌家山益以逼城帳前先鋒徐進自諸暨陷大軍中其意怏怏思不得歸大軍千户王娃者在揚州之日常與進約為兄弟遂䕶送至城下進邀與俱入見公衆皆意其覘諜疑之公命萬户楊仕全待飲食與縱觀上及諸倉庫既畢請歸去語汝將我為大元臣子守鎮城池毋以諸暨之失而易我今我城壁堅固兵食有餘又何患焉汝今若不早去徒送死耳乃與銀碗一箇官縀一疋命仕全送出常禧門而去御史大夫命元帥圖們岱爾以帳前軍二百人弓箭手二十人赴軍前聽調山隂頃里徐允讓妻潘氏年二十六歳嫁夫三日大軍至殺其夫見潘氏姿色曳迫以前潘氏曰我行不亂且吾夫方死不忍暴棄遺骸願將焚化随去庶絶吾念否則有死而已大軍從其言為拆民屋積而焚之烟焰方熾潘氏臨哭之遂投火而死城民傭保之徒數百交憤大軍為患致民庶失業詣軍前自陳請出城擊大軍公不許大尉張士誠遣元帥曹逞義鍾九臯運嘉興米十萬石黄家灣出海以逹三江時迎恩門以東五瑞等六門皆受敵惟昌安門無虞使命往來商旅出入舟車糧餉紛紜旁午為一城咽㗋之地萬户費復初守備得宜察而不苛萬民甚便之丁酉大軍率衆攻常禧門大軍之勢尤甚始交鋒社壇前我軍不利元帥顧徳興中箭傷足總管錢保中箭傷臂軍大進據跨河橋我軍退土壘又退月城大軍遂突而入我軍遂披靡相顧失色城上觀者擾亂奔潰城中居民為罷市上下大懼時公在戰船中叱諸將曰今日至此尚畏死耶乃自上馬執攩􅒎突入大軍陣叱之少却總管倪昶尤金共翼公為先鋒刀牌手分左右齊進元帥張子武萬户劉徳興率甲士繼之大軍奔潰乗勝追北至大軍寨而還先是城中鳴禁鐘以聲疾徐知大軍緩急然未甞擊也是日民俱駭懼或又擊鐘公怒命止之戒後勿擊仍禁民登城觀望自後交戰民皆不知公每擊大軍回至府中即出金帛賞諸軍分輕重俘獲多少各與頒賞莫不歡悦大軍連日攻門我軍分番出擊多所俘獲大軍皆預冩佔屋帖子藏身欲俟攻破之日貼佔屋會稽義兵仇萬户與姪近忠團結鄉民斬木為鹿角寨鑄石嶺内設強弩衆民守之大軍至屢為所傷後大軍大攻之遂破近忠遇害妻子皆被執大尉遣元帥徐昺徐忠堅統兵來赴援江浙分省劉志堅於杭州領萬户姚世隆領兵來會俱屯錢清復以事亟志堅復領部兵入城已扺常禧門外與大軍交鋒御史大夫勉勵諸將各加賞賜又以繡縀增賞萬户劉得興得興為人勇悍善能發矢軍中號為弩箭劉是日單騎迫大軍至闕時農工已興城外不能播植公深為之慮乃令民于城内預布種秧民連日守禦公慮妨其業乃俾上户五日中户三日下户二日得便輪日相代單丁老弱者免辛丑大軍決蜀阜壩又採槿木梗並木塞壩義兵爭之不果而去元帥張仕俊送糧三江口為海賊刼奪江浙省檢闕官韓惟仁領所部義兵殺散賊人復送糧米入城分省平章賞之以惟仁陞浙東宣撫副史僉都元帥府事御史大夫以倉糧及庫藏金帛助用癸卯大軍擁突至迎恩門我軍對陣門外道狹多水大軍為我所擠陷入泥中弓弩齊發射傷甚衆大軍將觀音努馳突我軍千户朱子明逆擊之觀音努陷于坑萬户宋之傑擒之以還乃胡大海義子請以金銀馬匹來贖不許至夜我軍逃歸者言大軍明日早攻城公命勇士分伏兵排栅内甲辰大軍首將建大皁纛旗於亭山號召各軍我軍出拒戰約有萬人彼軍負薪積篠於城外填河接路東連延不絶四面並進運載竹梯鈎索至城下鼓勇彼軍恃勢馳突未㡬猖獗特甚各門將士嚴隊固守千户馬俊等以先鋒持擊壯士沿河而進以火筒應時並發大軍不能支退而復合矢石交馳搏擊之聲自夜逹旦百户陸勝箭中其目剜睛而出其鏃公陞為千户乙巳黎明自迎恩門至五瑞門大軍陣皆布列公命分門拒敵躬自起督初公在常禧門外用雙刀入大軍陣内大軍以鈎鈎公首鎧公揮刀斷之公下馬持攩杈奮擊流矢亂射公傷其指總管馬飛萬户江遇龍共追大軍擁公而還大軍將寗同僉督攻稽山門我軍驍騎直前衝刺其馬寗同僉下馬㡬為我衆所擒彼軍扶上馬馳遁闕千户擊之至二更方止是日遣元帥張子武還平江指揮張憲與萬户趙世隆引兵出哨白塔等處憲在軍中不避艱險性梗直每委以廵警督令之事丁未御史大夫率僚屬致祭城隍祝詞曰云云至正十九年夏五月闕日大軍攻燒福嚴殿決官塘二十餘處元帥徐昺自錢清引兵馳救大衆遂于福嚴駐劄議决抱姑堰戊申掠會稽至柵頭執鄉民馮道一妻殺之其弟馮道二妻年少大軍謂曰從我則為妻不從我則死婦曰吾願殺不為妻也大軍喝令正立婦引頸受刀首墜於地我將蔡希仁于稽山門城上置砲架大軍各門立砲架庚戌萬户鄧思忠義兵千户周君佑陳志端潘偉丁吉甫何元道元帥徐昺等親率義夫三千人築抱姑堰元帥徐昺躬督視三日功成而畢思忠君佑以下賞勞有法時久雨水溢大軍每出戰不利彼歸婺州者相繼于道不知者往來于城外伺其動靜其頭目軍校多有避者公皆賞賜安慰之命戰船自東門出者入西門西門出者入東門經日廵哨不絶遇夜遣人踰河砟排栅察守者勤怠次日賞罰江浙行省以猪五十羊五十牛二十酒十罌來勞軍士壬子大軍率衆舉旗鳴鼓分隊而出戰于郊忽暴雨大至委頓而還大軍若求售公戒民居儉食用山會二縣排坊里正役繁賦重公聞之責曰鄉民破殘其可催辦且大軍之勢如此民命朝不謀夕爾軰還可為兼取計耶悉命放罷公見大軍之勢未退恐城中食少每勸民節用謂食肉者喫菜食飯者餟粥又禁米不許出郭貿易所得米輸于官受以文劵至杭給還之自是食貨阜通無滯監軍器局萬户戴本忠千户張世英以事得罪命分省鎮撫所知事代之甲寅復决抱姑堰元帥徐昺率民再築與元帥賈彪拒戰傷其臂彼將胡大海㡬獲之得河船二百隻時城外多水大軍不利呉後小赭蜀阜諸壩破決遂即築之抱姑堰當江湖衝嚙易決而易塞至是堰旁扎寨聚民水陸夾守西門守帥葉成往來廵哨尤謹由是自堰以東大軍不敢至丙辰大軍攻半港水寨我軍並出當敵萬户申智欲以騎兵旁出要衝拒戰良久大軍潰去百户景旺被箭鏃入股骨鑿而出之大尉出金帛賞功院判穆爾古蘓等官有差復以米萬石濟城中貧民我軍燒家庵寨大軍復再至戊午元帥劉宣數請撃大軍公不許是日稽山門大軍請戰復稟公許之部下將施巴延素驍勇督其衆以戰時大軍已設伏于春波橋下大軍交鋒佯敗巴延追之大軍分兩翼當前伏兵四起巴延下馬歩鬭手殺數人力不能支遂陷被擒己未大軍已得巴延頗驕矜麾衆復直至三橋將窺城我軍列陣于橋南兵刃接而復分百户商華以刀牌突陣奮擊殺一人大軍奪其尸舁去公坐城樓上見而壯之賞錢五十緡元帥劉宣賞縀一疋時造軍器數多木炭殆盡公命伐木于城中燒造又起竈燒石灰皆督吏尹彥良掌之山隂義兵千户周君佐屢獲大軍人馬以功陞萬户復署為常州吏大軍為書射入城中諷公以保富貴公笑而焚之至正十九年四月癸亥總管焦徳昭於稷山置水陸寨以遏大軍衝突招撫居民前後燒燬大軍傖塘等大寨大軍于城東江岸放決杜浦小金蟶浦諸壩義兵随築之丙寅出諸寨兵沿河岸而陣漸迫越城公坐戰船中謾罵輙飛矢雨注衆多怒欲擊之公方食令諸軍曰不俟命而輕進者斬大軍以我軍怯少懈公乃捨舟乗馬執攩杈衝前陣總管岳宗陸源從公後大軍將攩扠中公公格去以所執攩扠刺其馬胸盡刃馬倒彼將墮馬㡬被公獲大軍披靡南臺通事不善騎射以大夫率衆而出集賽岱阿珠中箭貫目而死己巳大軍將晨遣水軍數人至常禧門外潜伏官河中以稻草覆身分布兵翼而進之公立馬跨湖橋上望見水浮草云下敢有伏兵乎命遊騎搜之果得水軍於是邀擊俘獲殆盡大軍又攻稽山門逾春波橋大軍將蔡元帥鎧甲坐胡牀指揮其衆我軍以火筒射而仆之大軍徑舁之還寨先是大軍所恃者騎兵每出皆為先鋒我軍多掘坑坎布竹簽鐵菱又置竹牌泥中彼馬顛仆皆為我軍所獲自是騎兵少出矣丞相以至元鈔三十貫錠銀碗五十官縀五十束勞軍士鄉民陷大軍寨者多逃歸公命撫安之郡人王冕字元章負氣偃蹇居九里山中大兵至民皆避兵入城冕獨不入大軍執而欲殺之自言善能韜畧兵書得不死大軍將謝僉等資之偕行至婺州領見太祖高皇帝於軍門請定官額陳設攻取方畧上大悅即命授以重任命軍前督衆攻取紹興復治攻城器具又定決水之策畫圖本以示諸將辛未常禧門外大戰大軍首將王隆科臨陣萬户楊仕全策馬迎之刺傷隆科隆科乃大軍中勇將是日㡬被獲大軍欲往昌安門絶我糧道乃用王冕計自遶門山潜逾官河至右堰結寨太常山石佛寺一旦而成公命元帥包玉總管倪昶急攻之火筒砲石之聲晝夜不絶壬辰總管焦徳昭自曹娥引兵至右堰與昶軍會徳昭謂衆曰彼寨兩日不破方且得志不虞我來宜示以不戰伺其懈而擊之乃分調萬户張英守彼寨北門千户梁得成徐旺守南門徳昭㫤同萬户倪元亮申智同展興蔡旺守東門待巨螺吹動三路齊進大軍見我軍解甲休息果不為意萬户陳傑首出哨獲三人兵勢四合自辰至午大軍出戰數不利張英率衆先進仆其排栅獲大軍元帥及所乗馬諸兵鼓噪而入義兵千户何元道邵文斁以鄉民赴之廬舍焚之大軍弃糧奔陵家山寨擒獲者四人殺傷及溺水者甚衆元帥包玉萬户徐鎮引兵要其歸路獲馬七匹大軍寨既破公令郡長率民拆其排栅凡十餘里乙亥至常禧門挑戰數合至晚解散公與倪昶等潜攝其後至中堰胡大海寨内軍校大呼而前大軍惶怖不知所為且進且却士卒有踰垣而赴水死者我軍從而擊之獲大將二人先鋒三人馬二匹而萬户何清中流矢傷目大軍自右堰之敗人馬散亡甚衆頗咎王冕由此疎之大軍督燒五瑞門夜則歸陵家山營戊寅大軍將張彪自諸暨引兵攻蕭山守者不能禦大軍焚燎烟焰障天潰卒逃民渡江者如蟻庚申分省發兵救蕭山公遣人會合三江守禦元帥韓惟仁領義兵亦至大軍懼又守北幹山上望見洋商海船三百餘艘集江上大軍疑我軍至遂收掠財物孳畜而去公命惟仁招復居民整治宫府萬户吕誠守漁浦團結義兵勇卒備禦甚急民始安業大軍於植利門外填河接路首將胡大有率衆射之大軍回射大有中頥千户呉誠急趨上前以鎗刺之而斃大軍公壯之陞為萬户城外霖雨不止水潦泛溢于大軍寨下時溽暑鬱蒸疫癘大作大軍首將祈禱南鎮不應乃毁其像仆碑石元帥劉宣日日廵警城中體察奸細壬午我軍擊大軍禹廟下會稽義兵千户邵文斁守䕶鄉井臺省擢為崑山州判官大軍既失右堰欲窺昌安門及于官塘抵西施山連板屋百餘間欲扎營山下義兵燒之不果而去水軍鎮撫張文中與兄彦初潜通大軍為内應事覺伏誅戊子大軍至稽山門交戰東郭門守帥劉顯引兵接應被箭貫右足脛分省右丞謝寶璽自餘姚遣使軍前請率萬人入城應援總管焦徳昭於曹娥迎䕶渡江公遣掾吏龔瑾以糧二千石官縀百疋勞軍命海舟送至杭州至正十九年癸巳嚴州建徳縣典吏子福兒陷在大軍營使飼馬至是以胡大海所乗馬來歸丙申大軍過東郭門公坐戰船守命左右射之斃其馬大軍引退公復至稽山門督戰公每擒獲大軍多不殺釋之放還戒曰謹毋再來再來將不利汝後有再來亦釋之有三五次者其人投械拜伏葢公在陣日久知敵情態矣人感公威徳皆畏焉以白金二百兩賞勞四隅義兵戊戌大軍攻常禧門我軍相持久之遣先鋒接戰勝負未决萬户楊春戴珍等以鐵騎衝之大軍奔潰多溺水死獲元帥戈宗傑及馬二匹而還公嘆曰可惜楊長不在若在可得十馬萬户杜全是時病瘡未愈遣掾吏龔瑾元帥府吏譚零至太尉議軍事太尉以瑾為本院都事分臺官闕流之在婺州也韓瑠楊廸從焉瑠為掾吏廸為諮議其妻子皆在紹興瑠廸潜附書與親友王友文等囑攻城將士來送妻子至婺州書為邏卒所獲官執友文等公曰韓瑠楊廸不過為妻子計耳非有他事誰無親戚此有何罪公命焚而釋之大軍復窺昌安門自西施山築路至羅山庄闕距門㡬及一里萬户費復初引兵擊之大軍乃退癸卯大軍祭旗意舉火攻城甲申大軍編竹為笆捲闕笆内施木拒推挽而至欲用填河渡軍及為竹牌板屋軟梯轆轤等具運載悉赴城下分門攻城甚急守將胡僉院寗同僉等攻西門指揮楊景元帥黄保攻常禧門謝院判何同僉攻稽山門朱保同僉書總管等攻五瑞門四合並進我軍未及布陣大軍諸將已擁入土壘挨牌節次而進月城之下少却總管倪昶以甲士迎敵奮擊斬其挨牌八人左右二門我軍並出掎角兵勢大軍歩騎相蹂躪多墜濠塹中復為拒戰我軍驍騎吕天保馳突衝大軍陣馬躓被獲公與總管焦徳昭麾衆並進各門守將率衆併力相拒矢石齊發喊聲動地大軍之勢稍斂是夜大軍以板屋竹牌聨比布列架木為栅庇身栅上去越月城不數尺公戒城上民安卧無喧譁大軍詬罵至三更不已我軍以火箭燒其竹牌板屋大軍擾亂徹夜己巳天將曙大軍列陣於城外飛矢如雨又以火筒火箭鐵彈丸射入城中其鋒疾不可當我軍死戰萬户丁興祖率麾下當三橋兩中飛矢拒守不退居民連日作粥糜賫酒分門飲食我軍將士亦奮力擒獲彼帥及人馬是日大軍攻擊西門甚急公身先士卒繼其後廵視諸門一日往返四十餘次丙午大軍勢益熾皆致死將登城御史大夫慶童率官寮禱城隍祠及武安王廟我軍悉出土壘布陣接戰矢石交馳分合數次互相勝負至午後暴風忽起飛石揚沙塵埃蔽面人馬不能正立大軍將旗俱折器械舖舍縱横散亂白晝晦㝠我軍乗勢擊之接刃於風塵間人馬不相見大軍以四舟編聨而行上積枯薪乗風縱火直趨城門歩卒繼之公命海軍於河北岸鈎致其舟助以火箭頃刻焚而盡甲士沿河鏖戰以拒大軍我軍皆列河北風勢轉急一舟飄囬千户郎成及戰士九人皆陷大軍中公怒遣總管焦徳昭倪昶等共逐大軍過虹橋南悉燒其捲笆竹牌攻城之具盡被我軍所得有載草船十餘艘常禧稽山五瑞諸門大軍驚亂逃遁聞風木之聲皆疑人馬以是奔走蹂躪死傷甚衆獲元帥二人丁未收拾其衆復來遏城我軍敗之自是兩日交戰軍士衣不解甲排栅及城堞上流矢皆滿城外望見城中常有紫雲覆䕶戊午大軍復至苦戰不退我軍擒獲張元帥及士卒人馬凱噪而還大軍人馬連夜不得休息屢合屢敗攻城器械悉被燒毁又殺傷死亡勢已窮迫欲引去又恐我軍襲其後隂遣老弱疾病者先歸己酉大軍首將胡僉都等自燒其營先遁指揮楊景何同僉望見火熾同僉朱保攻五瑞門遁大軍各離心號令出於不一或前者已去後者不知或烹而未炊或炊而未食資裝器械委頓原野於是相怨相詈操戈相刃紛爭而去公督軍校分兵馳戮乗勝逐北大軍歩卒先行騎兵後殿總管倪昶錢保等追彼騎將及之騎回顧曰汝不知兵也耶趕人不可趕上倪昶曰休走好男子騎曰今日好男子被吕家趕散汝毋追我昶等不追遂還大軍又至為鄉民要殺不敢近金帛輜重悉皆奪之公坐城上見居民出觀大軍寨曰民患大軍攻城三月餘矣公命民悉取大軍營内財物所掠民間婦女紛紜田野公命入城中聚大善寺給以衣食聽還完聚又遣官屬詣各村招諭避兵人民復業耕種掩瘞尸骸之暴露者至正十九年己酉御史大夫慶童廵城賞勞各門將士先是城中牛畜抄掠入市屠賣者多命禁止軍士有獲大軍營内牛者官給米易之令人收畜至是多給鄉民耕種陞總管焦徳昭為將軍萬户秦希仁劉得興丁興祖為元帥以下將校論功陞賞有差常州縣主簿蔣志道有才幹往來浙西提督運糧又于杭州置備軍器火藥供給無失至是辟為掾吏初公命掾吏葛榮總管諸暨大軍奄至衆力屈不能敵請休兵榮不可軍潰被執送婺州大軍屢欲殺衆將止之送至績溪榮脫繫冐險來歸公俾為掾吏如初命簿尉司增城高五尺浚濠河增門十丈城北立窩舍置木登以耆宿韓昕南督之民岳宗唐元夀等建公生祠於卧龍山之西麓公諱珍字國寶安豐人係出故宋保相之後為人倜儻有大志偉貎多才沉毅英斷臨敵應變從容不驚量事任人各當其才賞賚士卒無所靳惜招懷降附待以不疑故人樂為之用將帥軍士或有異志輙先覺而後處之無踪尤人所難也城守之日陷陣摧敵身先士卒前後斬俘虜獲數千餘人節次歸附數百人萬户馬顯祖等數人生擒元帥戈宗傑張元帥謝元帥等五十餘人馬三十匹散軍頭目奚啻數百人大軍退之日論功推勞皆歸於下及報命太尉首以諸暨䘮師請降咎已職太尉不許公曰紹興城池堅固民心易附於保全不足為功自諸暨失守故大軍得至城下今若不明責珍罪大軍必謂太尉幸紹興之僅存而置暨於不問矣非所以明綱紀正王法故珍願就貶降以示不忘諸暨且使将士知珍之罪固請不已太尉從之自是但僉院置職未㡬御史大夫以功狀上經畧使陞同知院事及公拜命進退動止一遵禮法不以禄位留意初至越未㡬人民有以牛酒請勞軍士者公不受曰院判邁公惠於此邦爾民賴之今我之來既不能善政以撫亦無徳及于民不可却之公以全城自任其立心已見於此况夫紀律之嚴調度之密恩威並用賞罰有章故能内輯羣情外攘强敵卒以成其功云保越録
